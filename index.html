<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kbash Memory Benchmarks</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 20px; background: #0d1117; color: #c9d1d9; }
        h1 { color: #58a6ff; }
        p { color: #8b949e; }
        a { color: #58a6ff; }
        .chart-container { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 20px; margin: 20px 0; }
    </style>
</head>
<body>
    <h1>kbash Memory Benchmarks</h1>
    <p>Automated memory regression tracking for <a href="https://github.com/Adi2K/kbash">kbash</a> — a Kotlin Multiplatform bash interpreter.</p>
    <p>Alerts fire when any benchmark regresses by more than 15%.</p>
    <div class="chart-container">
        <canvas id="benchmarkChart"></canvas>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <script>
        async function loadBenchmarks() {
            try {
                const resp = await fetch('./dev/bench/data.json');
                const data = await resp.json();
                if (!data.entries) return;

                const benchmarks = Object.keys(data.entries);
                if (benchmarks.length === 0) return;

                const key = benchmarks[0];
                const entries = data.entries[key];
                if (!entries || entries.length === 0) return;

                // Group by benchmark name
                const nameSet = new Set();
                entries.forEach(e => e.benches.forEach(b => nameSet.add(b.name)));
                const names = [...nameSet].sort();

                // Build datasets
                const commits = entries.map(e => e.commit.id.substring(0, 7));
                const datasets = names.map((name, i) => {
                    const hue = (i * 360 / names.length) % 360;
                    return {
                        label: name.replace(/ \(KB\)$/, ''),
                        data: entries.map(e => {
                            const bench = e.benches.find(b => b.name === name);
                            return bench ? bench.value / 1024 : null;
                        }),
                        borderColor: `hsl(${hue}, 70%, 60%)`,
                        backgroundColor: `hsla(${hue}, 70%, 60%, 0.1)`,
                        tension: 0.3,
                        pointRadius: 3,
                    };
                });

                new Chart(document.getElementById('benchmarkChart'), {
                    type: 'line',
                    data: { labels: commits, datasets },
                    options: {
                        responsive: true,
                        plugins: {
                            title: { display: true, text: 'Memory Usage Over Time (KB)', color: '#c9d1d9', font: { size: 16 } },
                            legend: { labels: { color: '#8b949e', font: { size: 11 } } },
                        },
                        scales: {
                            x: { ticks: { color: '#8b949e' }, grid: { color: '#21262d' } },
                            y: { ticks: { color: '#8b949e' }, grid: { color: '#21262d' }, title: { display: true, text: 'KB', color: '#8b949e' } },
                        },
                    },
                });
            } catch (e) {
                document.querySelector('.chart-container').innerHTML =
                    '<p style="text-align:center;color:#8b949e;">No benchmark data yet. Data will appear after the first CI run on main.</p>';
            }
        }
        loadBenchmarks();
    </script>
</body>
</html>
